### Global Values ###
global:
  clusterDomain: cluster.local
  logLevel: info
  trentoWeb:
    name: web
    servicePort: 4000
    origin: ""
  trentoWanda:
    name: wanda
    servicePort: 4000
  trentoMcpServer:
    name: mcp-server
    servicePort: 5000
  postgresql:
    name: postgresql
    servicePort: 5432
    postgresqlUsername: "postgres"
    postgresqlPassword: "postgres"
    image:
      registry: registry.suse.com
      repository: suse/postgres
      tag: "17.5"
  prometheus:
    name: prometheus-server
    pathPrefix: /prometheus
  rabbitmq:
    name: rabbitmq
    servicePort: 5672
    ports:
      amqp: 5672
      amqpTls: 5671
    auth:
      username: trento
      password: trento
    tls:
      mtls:
        enabled: false
        certManager:
          enabled: true
          issuerName: rabbitmq-ca-issuer
          issuerKind: Issuer

### Sub Charts Specific Values ###
trento-web:
  nameOverride: web
  enabled: true
  image:
    repository: ghcr.io/trento-project/trento-web

trento-wanda:
  nameOverride: wanda
  enabled: true
  image:
    repository: ghcr.io/trento-project/trento-wanda
  checks:
    image:
      repository: ghcr.io/trento-project/checks

trento-mcp-server:
  nameOverride: mcp-server
  enabled: false
  image:
    repository: ghcr.io/trento-project/mcp-server-trento

postgresql:
  enabled: true
  architecture: replication
  postgresqlDataDir: /var/lib/postgresql/data/trento
  auth:
    usePasswordFiles: false
    replicationPassword: "postgres"
  migrationHook:
    image:
      registry: registry.suse.com
      repository: bci/bci-micro
      tag: "latest"
  metrics:
    # Override DATA_SOURCE_URI to connect to 'trento' database instead of hardcoded 'postgres'
    extraEnvVars:
      - name: DATA_SOURCE_URI
        value: "127.0.0.1:5432/trento?sslmode=disable"
  primary:
    persistence:
      mountPath: /var/lib/postgresql/data
    podSecurityContext:
      fsGroup: 0
    containerSecurityContext:
      runAsUser: 0
      runAsGroup: 0
      runAsNonRoot: false
    customLivenessProbe:
      exec:
        command:
          - /bin/sh
          - -c
          - exec pg_isready -U "postgres" -d "dbname=trento" -h 127.0.0.1 -p 5432
      initialDelaySeconds: 30
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 6
      successThreshold: 1
    customReadinessProbe:
      exec:
        command:
          - /bin/sh
          - -c
          - -e
          - |
            exec pg_isready -U "postgres" -d "dbname=trento" -h 127.0.0.1 -p 5432
      initialDelaySeconds: 5
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 6
      successThreshold: 1
    initContainers:
      # Runs pg_upgrade in-place before PostgreSQL starts when the major version changes.
      # PGAUTO_ONESHOT exits immediately with no-op when no upgrade is needed, so this is safe on every restart.
      # Image tag must match global.postgresql.image.tag (e.g. "17-debian").
      # https://github.com/bitnami/charts/issues/14926#issuecomment-3192189184
      - name: upgrade-postgres
        image: "pgautoupgrade/pgautoupgrade:{{ .Values.global.postgresql.image.tag }}-debian"
        securityContext:
          runAsUser: 0
        volumeMounts:
          - name: data
            mountPath: /var/lib/postgresql/data
        env:
          - name: PGAUTO_ONESHOT
            value: "yes"
          - name: POSTGRES_DB
            value: postgres
          - name: PGDATA
            value: /var/lib/postgresql/data/trento
  readReplicas:
    persistence:
      mountPath: /var/lib/postgresql/data
    podSecurityContext:
      fsGroup: 0
    containerSecurityContext:
      runAsUser: 0
      runAsGroup: 0
      runAsNonRoot: false
    customLivenessProbe:
      exec:
        command:
          - /bin/sh
          - -c
          - exec pg_isready -U "postgres" -d "dbname=trento" -h 127.0.0.1 -p 5432
      initialDelaySeconds: 30
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 6
      successThreshold: 1
    customReadinessProbe:
      exec:
        command:
          - /bin/sh
          - -c
          - -e
          - |
            exec pg_isready -U "postgres" -d "dbname=trento" -h 127.0.0.1 -p 5432
      initialDelaySeconds: 5
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 6
      successThreshold: 1
    initContainers:
      # Runs pg_upgrade in-place before PostgreSQL starts when the major version changes.
      # PGAUTO_ONESHOT exits immediately with no-op when no upgrade is needed, so this is safe on every restart.
      # Image tag must match global.postgresql.image.tag (e.g. "17-debian").
      # https://github.com/bitnami/charts/issues/14926#issuecomment-3192189184
      - name: upgrade-postgres
        image: "pgautoupgrade/pgautoupgrade:{{ .Values.global.postgresql.image.tag }}-debian"
        securityContext:
          runAsUser: 0
        volumeMounts:
          - name: data
            mountPath: /var/lib/postgresql/data
        env:
          - name: PGAUTO_ONESHOT
            value: "yes"
          - name: POSTGRES_DB
            value: postgres
          - name: PGDATA
            value: /var/lib/postgresql/data/trento

prometheus:
  enabled: true
  scrapeConfigs: null
  server:
    enabled: true
    image:
      tag: v3.12.0
    configMapOverrideName: prometheus-configmap
    prefixURL: "/prometheus"
    baseURL: "/prometheus"
    extraFlags:
      - web.enable-lifecycle
      - web.enable-remote-write-receiver
    auth:
      # type must be explicitly set to 'none' or 'basic'
      type: ""
      basic:
        username: ""
        password: ""
    sidecarContainers:
      auth-proxy:
        image: registry.suse.com/suse/nginx:1.27
        ports:
          - containerPort: 8081
        volumeMounts:
          - name: auth-proxy-config
            mountPath: /etc/nginx/nginx.conf
            subPath: nginx.conf
          - name: auth-proxy-htpasswd
            mountPath: /etc/nginx/auth
            readOnly: true
          - name: nginx-log
            mountPath: /var/log/nginx
    extraVolumes:
      - name: auth-proxy-config
        configMap:
          name: trento-prometheus-auth-config
      - name: auth-proxy-htpasswd
        secret:
          secretName: trento-prometheus-auth-htpasswd
          optional: true
      - name: nginx-log
        emptyDir: {}
    service:
      additionalPorts:
        - name: auth-proxy
          port: 8081
          protocol: TCP
          targetPort: 8081

    ingress:
      enabled: true
      ingressClassName: ""
      annotations: {}
      hosts:
        - ""
      path: /prometheus
      pathType: Prefix
      tls: []
      # Route ingress traffic through the auth sidecar
      servicePort: 8081

  alertmanager:
    enabled: false
  prometheus-pushgateway:
    enabled: false
  configmapReload:
    prometheus:
      enabled: false
  kube-state-metrics:
    enabled: false
  prometheus-node-exporter:
    enabled: false

  migrationHook:
    image:
      registry: registry.suse.com
      repository: suse/kubectl
      tag: "1.35"

rabbitmq:
  enabled: true
  auth:
    username: trento
    password: trento
  persistence:
    enabled: true
  service:
    type: LoadBalancer
  volumePermissions:
    enabled: true

  extraConfiguration: |
    {{- if .Values.global.rabbitmq.tls.mtls.enabled }}
    listeners.ssl.default = 5671
    listeners.tcp = none

    ssl_options.cacertfile = /etc/rabbitmq-tls/ca.crt
    ssl_options.certfile = /etc/rabbitmq-tls/tls.crt
    ssl_options.keyfile = /etc/rabbitmq-tls/tls.key
    ssl_options.verify = verify_peer
    ssl_options.fail_if_no_peer_cert = true
    ssl_options.versions.1 = tlsv1.3
    ssl_options.versions.2 = tlsv1.2
    {{- else }}
    listeners.tcp.default = 5672
    {{- end }}
