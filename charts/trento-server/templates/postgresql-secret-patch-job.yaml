{{- if and .Values.postgresql.enabled (eq .Values.postgresql.architecture "replication") -}}
{{- /*
  Patches the PostgreSQL secret to add the replication-password key when upgrading
  from standalone to replication architecture. The Bitnami PostgreSQL chart
  validates that the replication-password key exists in the secret when
  architecture=replication, but existing secrets from standalone installations
  lack this key. This hook adds it before the chart validation runs.
*/ -}}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Release.Name }}-postgresql-patch
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/hook": pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ .Release.Name }}-postgresql-patch
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/hook": pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
rules:
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ .Release.Name }}-postgresql-patch
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/hook": pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ .Release.Name }}-postgresql-patch
subjects:
- kind: ServiceAccount
  name: {{ .Release.Name }}-postgresql-patch
  namespace: {{ .Release.Namespace }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-postgresql-patch
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/hook": pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  template:
    metadata:
      name: {{ .Release.Name }}-postgresql-patch
    spec:
      restartPolicy: Never
      serviceAccountName: {{ .Release.Name }}-postgresql-patch
      containers:
      - name: kubectl
        image: "{{ .Values.postgresql.migrationHook.image.registry }}/{{ .Values.postgresql.migrationHook.image.repository }}:{{ .Values.postgresql.migrationHook.image.tag }}"
        command:
        - /bin/sh
        - -c
        - |
          set -e
          SECRET_NAME="{{ .Release.Name }}-postgresql"

          # Check if secret exists
          if ! kubectl get secret "$SECRET_NAME" -n {{ .Release.Namespace }} > /dev/null 2>&1; then
            echo "Secret $SECRET_NAME does not exist, skipping patch (likely fresh install)"
            exit 0
          fi

          # Check if replication-password key already exists
          if kubectl get secret "$SECRET_NAME" -n {{ .Release.Namespace }} -o jsonpath='{.data.replication-password}' 2>/dev/null | grep -q .; then
            echo "Secret $SECRET_NAME already has replication-password key, skipping patch"
            exit 0
          fi

          # Add replication-password key to the secret
          echo "Patching secret $SECRET_NAME to add replication-password"
          kubectl patch secret "$SECRET_NAME" -n {{ .Release.Namespace }} --type='json' -p='[
            {
              "op": "add",
              "path": "/data/replication-password",
              "value": "{{ .Values.postgresql.auth.replicationPassword | b64enc }}"
            }
          ]'
          echo "Secret patched successfully"
{{- end }}
