{{- if .Values.postgresql.enabled }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "common.names.fullname" . }}-postgresql-secret-migration
  namespace: {{ include "common.names.namespace" . | quote }}
  annotations:
    "helm.sh/hook": pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "common.names.fullname" . }}-postgresql-secret-migration
  namespace: {{ include "common.names.namespace" . | quote }}
  annotations:
    "helm.sh/hook": pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
rules:
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "common.names.fullname" . }}-postgresql-secret-migration
  namespace: {{ include "common.names.namespace" . | quote }}
  annotations:
    "helm.sh/hook": pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
subjects:
- kind: ServiceAccount
  name: {{ include "common.names.fullname" . }}-postgresql-secret-migration
  namespace: {{ include "common.names.namespace" . | quote }}
roleRef:
  kind: Role
  name: {{ include "common.names.fullname" . }}-postgresql-secret-migration
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "common.names.fullname" . }}-postgresql-secret-migration
  namespace: {{ include "common.names.namespace" . | quote }}
  annotations:
    "helm.sh/hook": pre-upgrade
    "helm.sh/hook-weight": "-1"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 3
  template:
    spec:
      serviceAccountName: {{ include "common.names.fullname" . }}-postgresql-secret-migration
      restartPolicy: Never
      containers:
      - name: migrate
        image: "{{ .Values.postgresql.migrationHook.image.registry }}/{{ .Values.postgresql.migrationHook.image.repository }}:{{ .Values.postgresql.migrationHook.image.tag }}"
        command:
        - sh
        - -c
        - |
          set -e

          SECRET_NAME="{{ include "common.names.fullname" . }}-postgresql"
          NAMESPACE="{{ include "common.names.namespace" . }}"

          echo "Checking if secret $SECRET_NAME exists..."
          if ! kubectl get secret "$SECRET_NAME" -n "$NAMESPACE" >/dev/null 2>&1; then
            echo "Secret does not exist, nothing to migrate"
            exit 0
          fi

          echo "Checking for old secret key names..."
          OLD_POSTGRES_PASSWORD=$(kubectl get secret "$SECRET_NAME" -n "$NAMESPACE" -o jsonpath='{.data.postgresql-postgres-password}' 2>/dev/null || echo "")
          OLD_USER_PASSWORD=$(kubectl get secret "$SECRET_NAME" -n "$NAMESPACE" -o jsonpath='{.data.postgresql-password}' 2>/dev/null || echo "")

          if [ -z "$OLD_POSTGRES_PASSWORD" ] && [ -z "$OLD_USER_PASSWORD" ]; then
            echo "No old secret keys found, nothing to migrate"
            exit 0
          fi

          echo "Migrating secret keys..."
          PATCH='{"data":{}}'

          if [ -n "$OLD_POSTGRES_PASSWORD" ]; then
            echo "Migrating postgresql-postgres-password -> postgres-password"
            PATCH=$(echo "$PATCH" | jq --arg val "$OLD_POSTGRES_PASSWORD" '.data["postgres-password"] = $val')
          fi

          if [ -n "$OLD_USER_PASSWORD" ]; then
            echo "Migrating postgresql-password -> password"
            PATCH=$(echo "$PATCH" | jq --arg val "$OLD_USER_PASSWORD" '.data["password"] = $val')
          fi

          kubectl patch secret "$SECRET_NAME" -n "$NAMESPACE" --type=merge -p "$PATCH"

          echo "Secret migration completed successfully"
{{- end }}
