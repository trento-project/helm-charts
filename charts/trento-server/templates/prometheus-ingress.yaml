{{- if .Values.prometheus.enabled -}}
{{- $ingressValues := index .Values "trento-web" "ingress" -}}
{{- if $ingressValues.enabled -}}
{{- if semverCompare ">=1.19-0" .Capabilities.KubeVersion.GitVersion -}}
apiVersion: networking.k8s.io/v1
{{- else if semverCompare ">=1.14-0" .Capabilities.KubeVersion.GitVersion -}}
apiVersion: networking.k8s.io/v1beta1
{{- else -}}
apiVersion: extensions/v1beta1
{{- end }}
kind: Ingress
metadata:
  name: {{ .Release.Name }}-prometheus-ingress
  namespace: {{ .Release.Namespace }}
  {{- with $ingressValues.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if and $ingressValues.className (semverCompare ">=1.18-0" .Capabilities.KubeVersion.GitVersion) }}
  ingressClassName: {{ $ingressValues.className }}
  {{- end }}
  {{- if $ingressValues.tls }}
  tls:
    {{- range $ingressValues.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
    {{- range $ingressValues.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          - path: /prometheus
            {{- if semverCompare ">=1.18-0" $.Capabilities.KubeVersion.GitVersion }}
            pathType: Prefix
            {{- end }}
            backend:
              {{- if semverCompare ">=1.19-0" $.Capabilities.KubeVersion.GitVersion }}
              service:
                name: {{ $.Release.Name }}-{{ $.Values.global.prometheus.name }}
                port:
                  number: 80
              {{- else }}
              serviceName: {{ $.Release.Name }}-{{ $.Values.global.prometheus.name }}
              servicePort: 80
              {{- end }}
    {{- end }}
{{- end }}
{{- end }}
